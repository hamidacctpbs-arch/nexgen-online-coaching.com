<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen Coaching Academy</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }
        header { background: linear-gradient(135deg, #6e8efb, #a777e3); color: white; padding: 60px 20px; text-align: center; }
        header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 2px; }
        header p { font-size: 1.2rem; opacity: 0.9; }
        .container { padding: 40px 20px; max-width: 800px; margin: auto; text-align: center; }
        .btn { background: #ff4757; color: white; padding: 15px 30px; text-decoration: none; border-radius: 30px; font-weight: bold; display: inline-block; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #ff6b81; transform: scale(1.05); }
        .courses { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 40px; }
        .course-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 250px; }
        footer { background: #333; color: white; text-align: center; padding: 20px; position: relative; bottom: 0; width: 100%; }
    </style>
</head>
<body>

<header>
    <h1>NexGen Coaching Academy</h1>
    <p>আগামী প্রজন্মের জন্য আধুনিক অনলাইন লার্নিং প্ল্যাটফর্ম</p>
</header>

<div class="container">
    <h2>আমাদের কোর্সসমূহ</h2>
    <div class="courses">
        <div class="course-card">
            <h3>Skill Development</h3>
            <p>নতুন দক্ষতা শিখুন আধুনিক পদ্ধতিতে।</p>
        </div>
        <div class="course-card">
            <h3>Academic Excellence</h3>
            <p>পরীক্ষায় সেরা ফলাফলের পূর্ণাঙ্গ গাইডলাইন।</p>
        </div>
    </div>
    <a href="#" class="btn">ভর্তি হতে ক্লিক করুন</a>
</div>

<footer>
    <p>&copy; 2024 NexGen Coaching Academy | Built with ❤️ on GitHub</p>
</footer>

</body>
</html>
