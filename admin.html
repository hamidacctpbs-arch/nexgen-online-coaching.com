<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen Admin | Auto-Control</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .box { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #b32d2e; text-align: center; }
        .section { margin-top: 20px; padding: 15px; border-radius: 12px; background: #fafafa; border: 1px solid #eee; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #5a4a9c; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #5a4a9c; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .danger-btn { background: #e74c3c; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login" class="box">
        <h2>Admin Access</h2>
        <input type="password" id="pass" placeholder="পাসওয়ার্ড দিন (admin7788)">
        <button onclick="check()">Login</button>
    </div>

    <div id="panel" class="box" style="display:none;">
        <h2>NexGen Auto-Admin</h2>
        <hr>

        <!-- ১. লাইভ ক্লাস লিঙ্ক -->
        <div class="section">
            <label>🔴 Live Class Link</label>
            <input type="text" id="link" placeholder="Google Meet Link">
            <button onclick="save('liveLink', 'link')">Update Link</button>
        </div>

        <!-- ২. অটো এক্সাম সেটআপ -->
        <div class="section">
            <label>📝 Exam Name</label>
            <input type="text" id="eName" placeholder="e.g. Physics Daily Exam 01">
            
            <label>✅ Answer Key (Automation)</label>
            <textarea id="eKey" placeholder="কমা দিয়ে উত্তর লিখুন: A,C,B,D,A"></textarea>
            <small style="color: #888;">*মেশিন এই উত্তরগুলো দেখে খাতা চেক করবে।</small>
            <button onclick="saveExam()" style="margin-top:10px;">Activate Auto-Exam</button>
        </div>

        <!-- ৩. র‍্যাঙ্কিং রিসেট (নতুন পরীক্ষার জন্য) -->
        <div class="section">
            <label>📊 Leaderboard Control</label>
            <button class="danger-btn" onclick="clearResults()">Reset All Rankings</button>
        </div>

        <button style="background:#777; margin-top:20px;" onclick="location.reload()">Logout</button>
    </div>

    <script>
        function check() {
            if(document.getElementById('pass').value === "admin7788") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
            } else { alert("ভুল পাসওয়ার্ড!"); }
        }

        function save(key, id) {
            localStorage.setItem(key, document.getElementById(id).value);
            alert("Updated!");
        }

        function saveExam() {
            const name = document.getElementById('eName').value;
            const key = document.getElementById('eKey').value.toUpperCase();
            localStorage.setItem('examName', name);
            localStorage.setItem('ansKey', key); // এই কি-টিই index.html এর মেশিন রিড করবে
            alert("Auto-Exam Activated!");
        }

        function clearResults() {
            if(confirm("আপনি কি সব স্টুডেন্টের র‍্যাঙ্কিং মুছে ফেলতে চান?")) {
                localStorage.removeItem('allResults');
                alert("Rankings Cleared!");
            }
        }
    </script>
</body>
</html>
